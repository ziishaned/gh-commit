name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Run go vet
      run: go vet ./...

    - name: Run tests with race detector
      run: go test -race -v ./...

    - name: Build
      run: go build -o bin/commit ./cmd/commit

    - name: Verify binary exists
      run: |
        test -f bin/commit
        file bin/commit
